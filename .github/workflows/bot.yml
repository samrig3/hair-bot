name: Hair Bot

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Manual trigger button in the Actions tab

# Only one run at a time. If a new run starts while one is going, it waits
# rather than racing on the state.json commit.
concurrency:
  group: hair-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so the workflow can commit state.json back
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
        run: python bot.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -z $(git status --porcelain state.json) ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          # Save our new state aside, then sync with remote and re-apply it.
          # This avoids rebase cherry-pick skipping that can silently drop the
          # state update when runs overlap.
          cp state.json /tmp/state.json
          for i in 1 2 3 4 5; do
            git stash --include-untracked >/dev/null 2>&1 || true
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/state.json state.json
            if [[ -z $(git status --porcelain state.json) ]]; then
              echo "Remote already has this state; nothing to push."
              exit 0
            fi
            git add state.json
            git commit -m "Update state [skip ci]"
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push failed (attempt $i), syncing and retrying..."
          done
          echo "Could not push state after retries; will try again next run."
          exit 0
